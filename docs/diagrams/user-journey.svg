<svg viewBox="0 0 1800 1200" width="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1800" height="1200" fill="#ffffff"/>

  <text x="60" y="60" font-size="32" font-weight="700" fill="#111827">User Journey</text>
  <text x="60" y="92" font-size="17" fill="#4b5563">Employee with an IT problem, from first realization to resolution</text>

  <g font-size="16" font-weight="700" fill="white">
    <rect x="60" y="140" width="320" height="50" fill="#111827" rx="8"/>
    <text x="220" y="172" text-anchor="middle">1. Trigger</text>

    <rect x="400" y="140" width="320" height="50" fill="#111827" rx="8"/>
    <text x="560" y="172" text-anchor="middle">2. Entry</text>

    <rect x="740" y="140" width="320" height="50" fill="#111827" rx="8"/>
    <text x="900" y="172" text-anchor="middle">3. Interaction</text>

    <rect x="1080" y="140" width="320" height="50" fill="#111827" rx="8"/>
    <text x="1240" y="172" text-anchor="middle">4. Outcome</text>

    <rect x="1420" y="140" width="320" height="50" fill="#111827" rx="8"/>
    <text x="1580" y="172" text-anchor="middle">5. Follow up</text>
  </g>

  <line x1="60" y1="215" x2="1740" y2="215" stroke="#9ca3af" stroke-width="3" stroke-dasharray="8,5"/>
  <polygon points="1734,209 1746,215 1734,221" fill="#9ca3af"/>

  <text x="60" y="270" font-size="14" font-weight="700" fill="#4b5563">USER ACTION</text>

  <g font-size="15" fill="#111827">
    <rect x="60" y="285" width="320" height="140" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="10"/>
    <text x="80" y="315">Realizes they need help with</text>
    <text x="80" y="338">access to a tool, an account</text>
    <text x="80" y="361">issue, or a ticket they filed</text>
    <text x="80" y="384">earlier this week</text>

    <rect x="400" y="285" width="320" height="140" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="10"/>
    <text x="420" y="315">Opens the chat assistant in</text>
    <text x="420" y="338">a browser tab on their laptop</text>
    <text x="420" y="361" font-size="13" fill="#6b7280">In a future iteration this would</text>
    <text x="420" y="380" font-size="13" fill="#6b7280">be available in Slack as well</text>

    <rect x="740" y="285" width="320" height="140" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="10"/>
    <text x="760" y="315">Types the request in plain</text>
    <text x="760" y="338">language</text>
    <text x="760" y="368" font-size="13" fill="#6b7280">No forms, no categories,</text>
    <text x="760" y="388" font-size="13" fill="#6b7280">no priority dropdown</text>

    <rect x="1080" y="285" width="320" height="140" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="10"/>
    <text x="1100" y="315">Receives one of three things</text>
    <text x="1100" y="345" font-size="14">A direct answer with sources</text>
    <text x="1100" y="367" font-size="14">A tool action confirmation</text>
    <text x="1100" y="389" font-size="14">An escalation to human IT</text>

    <rect x="1420" y="285" width="320" height="140" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="10"/>
    <text x="1440" y="315">Self resolves OR waits for</text>
    <text x="1440" y="338">a human</text>
    <text x="1440" y="368" font-size="13" fill="#6b7280">If a human is needed, they</text>
    <text x="1440" y="388" font-size="13" fill="#6b7280">already have full context</text>
  </g>

  <text x="60" y="475" font-size="14" font-weight="700" fill="#b91c1c">PAIN POINT WITHOUT US</text>

  <g font-size="15">
    <rect x="60" y="490" width="320" height="140" fill="#fef2f2" stroke="#f87171" stroke-width="2" rx="10"/>
    <text x="80" y="522" font-weight="700" fill="#7f1d1d">Where do I even start</text>
    <text x="80" y="552" font-size="14" fill="#991b1b">Wiki, Slack, IT portal, ticket</text>
    <text x="80" y="572" font-size="14" fill="#991b1b">queue, or just email someone</text>
    <text x="80" y="595" font-size="14" fill="#991b1b">Different answers everywhere</text>

    <rect x="400" y="490" width="320" height="140" fill="#fef2f2" stroke="#f87171" stroke-width="2" rx="10"/>
    <text x="420" y="522" font-weight="700" fill="#7f1d1d">How do I phrase this</text>
    <text x="420" y="552" font-size="14" fill="#991b1b">Ticket forms ask for priority,</text>
    <text x="420" y="572" font-size="14" fill="#991b1b">category, system, urgency</text>
    <text x="420" y="595" font-size="14" fill="#991b1b">User does not know any of it</text>

    <rect x="740" y="490" width="320" height="140" fill="#fef2f2" stroke="#f87171" stroke-width="2" rx="10"/>
    <text x="760" y="522" font-weight="700" fill="#7f1d1d">Did this even submit</text>
    <text x="760" y="552" font-size="14" fill="#991b1b">No feedback while waiting</text>
    <text x="760" y="572" font-size="14" fill="#991b1b">Long load times</text>
    <text x="760" y="595" font-size="14" fill="#991b1b">No idea what happens next</text>

    <rect x="1080" y="490" width="320" height="140" fill="#fef2f2" stroke="#f87171" stroke-width="2" rx="10"/>
    <text x="1100" y="522" font-weight="700" fill="#7f1d1d">Is the answer right</text>
    <text x="1100" y="552" font-size="14" fill="#991b1b">Generic AI without sources</text>
    <text x="1100" y="572" font-size="14" fill="#991b1b">Could be invented</text>
    <text x="1100" y="595" font-size="14" fill="#991b1b">Now the user is exposed</text>

    <rect x="1420" y="490" width="320" height="140" fill="#fef2f2" stroke="#f87171" stroke-width="2" rx="10"/>
    <text x="1440" y="522" font-weight="700" fill="#7f1d1d">Now I retell my story</text>
    <text x="1440" y="552" font-size="14" fill="#991b1b">Reach out to IT</text>
    <text x="1440" y="572" font-size="14" fill="#991b1b">Repeat all the context</text>
    <text x="1440" y="595" font-size="14" fill="#991b1b">Repeat all the frustration</text>
  </g>

  <text x="60" y="680" font-size="14" font-weight="700" fill="#047857">HOW THE SYSTEM ADDRESSES IT</text>

  <g font-size="15">
    <rect x="60" y="695" width="320" height="140" fill="#f0fdf4" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="80" y="727" font-weight="700" fill="#064e3b">A single chat front door</text>
    <text x="80" y="757" font-size="14" fill="#166534">No portal hopping</text>
    <text x="80" y="777" font-size="14" fill="#166534">A welcome message lists</text>
    <text x="80" y="797" font-size="14" fill="#166534">what we handle</text>

    <rect x="400" y="695" width="320" height="140" fill="#f0fdf4" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="420" y="727" font-weight="700" fill="#064e3b">Free text input</text>
    <text x="420" y="757" font-size="14" fill="#166534">The Intake Agent classifies</text>
    <text x="420" y="777" font-size="14" fill="#166534">the request and pulls out the</text>
    <text x="420" y="797" font-size="14" fill="#166534">details on the user's behalf</text>

    <rect x="740" y="695" width="320" height="140" fill="#f0fdf4" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="760" y="727" font-weight="700" fill="#064e3b">Live status indicator</text>
    <text x="760" y="757" font-size="14" fill="#166534">Classifying request</text>
    <text x="760" y="777" font-size="14" fill="#166534">Searching documentation</text>
    <text x="760" y="797" font-size="14" fill="#166534">Submitting your request</text>

    <rect x="1080" y="695" width="320" height="140" fill="#f0fdf4" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="1100" y="727" font-weight="700" fill="#064e3b">Source citations</text>
    <text x="1100" y="757" font-size="14" fill="#166534">Every grounded answer cites</text>
    <text x="1100" y="777" font-size="14" fill="#166534">the section it came from</text>
    <text x="1100" y="797" font-size="14" fill="#166534">Users can verify the policy</text>

    <rect x="1420" y="695" width="320" height="140" fill="#f0fdf4" stroke="#34d399" stroke-width="2" rx="10"/>
    <text x="1440" y="727" font-weight="700" fill="#064e3b">Structured handoff</text>
    <text x="1440" y="757" font-size="14" fill="#166534">Original message, intent,</text>
    <text x="1440" y="777" font-size="14" fill="#166534">extracted entities, tools tried</text>
    <text x="1440" y="797" font-size="14" fill="#166534">all delivered to Tier 2</text>
  </g>

  <text x="60" y="890" font-size="14" font-weight="700" fill="#4b5563">EMOTIONAL ARC</text>

  <rect x="60" y="905" width="1680" height="160" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="10"/>

  <path d="M 220 1015 Q 390 990 560 970 Q 730 945 900 945 Q 1070 935 1240 920 Q 1410 920 1580 920"
    stroke="#2563eb" stroke-width="4" fill="none"/>

  <g font-size="14" fill="#111827">
    <circle cx="220" cy="1015" r="9" fill="#dc2626"/>
    <text x="220" y="1045" text-anchor="middle" font-weight="700" fill="#7f1d1d">Frustrated</text>

    <circle cx="560" cy="970" r="9" fill="#f59e0b"/>
    <text x="560" y="1000" text-anchor="middle" font-weight="700" fill="#92400e">Curious</text>

    <circle cx="900" cy="945" r="9" fill="#2563eb"/>
    <text x="900" y="975" text-anchor="middle" font-weight="700" fill="#1e40af">Engaged</text>

    <circle cx="1240" cy="920" r="9" fill="#10b981"/>
    <text x="1240" y="950" text-anchor="middle" font-weight="700" fill="#064e3b">Relieved</text>

    <circle cx="1580" cy="920" r="9" fill="#10b981"/>
    <text x="1580" y="950" text-anchor="middle" font-weight="700" fill="#064e3b">Resolved</text>
  </g>

  <rect x="60" y="1095" width="1680" height="80" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5" rx="10"/>
  <text x="80" y="1124" font-size="16" font-weight="700" fill="#111827">Why this journey works</text>
  <g font-size="14" fill="#374151">
    <text x="80" y="1148">The user never has to know which IT system to talk to. There is one front door for everything.</text>
    <text x="80" y="1168">When the AI cannot resolve the request, escalation is fast and Tier 2 receives the full context already assembled.</text>
  </g>
</svg>
