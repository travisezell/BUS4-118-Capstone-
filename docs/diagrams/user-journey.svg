<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1600" height="900" fill="#fafafa"/>

  <!-- Title -->
  <text x="40" y="44" font-size="24" font-weight="700" fill="#222">User Journey Map</text>
  <text x="40" y="68" font-size="14" fill="#666">Employee with an IT problem · five phases from trigger to resolution</text>

  <!-- Phase headers -->
  <g font-size="12" font-weight="700" fill="#444">
    <rect x="80" y="100" width="280" height="36" fill="#1f2937" rx="6"/>
    <text x="220" y="124" text-anchor="middle" fill="white">1 · TRIGGER</text>

    <rect x="380" y="100" width="280" height="36" fill="#1f2937" rx="6"/>
    <text x="520" y="124" text-anchor="middle" fill="white">2 · ENTRY</text>

    <rect x="680" y="100" width="280" height="36" fill="#1f2937" rx="6"/>
    <text x="820" y="124" text-anchor="middle" fill="white">3 · INTERACTION</text>

    <rect x="980" y="100" width="280" height="36" fill="#1f2937" rx="6"/>
    <text x="1120" y="124" text-anchor="middle" fill="white">4 · OUTCOME</text>

    <rect x="1280" y="100" width="280" height="36" fill="#1f2937" rx="6"/>
    <text x="1420" y="124" text-anchor="middle" fill="white">5 · FOLLOW-UP</text>
  </g>

  <!-- Connecting arrow -->
  <line x1="80" y1="155" x2="1560" y2="155" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6,4"/>
  <polygon points="1556,150 1566,155 1556,160" fill="#cbd5e1"/>

  <!-- Row label: User action -->
  <text x="40" y="200" font-size="11" font-weight="700" fill="#666" letter-spacing="0.5">USER ACTION</text>

  <g font-size="12" fill="#1f2937">
    <rect x="80" y="180" width="280" height="86" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
    <text x="100" y="206">Realizes they need:</text>
    <text x="100" y="225">• access to a new tool</text>
    <text x="100" y="242">• help with an account</text>
    <text x="100" y="259">• status of a request</text>

    <rect x="380" y="180" width="280" height="86" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
    <text x="400" y="206">Opens the chat assistant</text>
    <text x="400" y="225" font-size="11" fill="#666">(or a Slack message,</text>
    <text x="400" y="240" font-size="11" fill="#666">in a future iteration)</text>

    <rect x="680" y="180" width="280" height="86" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
    <text x="700" y="206">Types the request in</text>
    <text x="700" y="223">plain language —</text>
    <text x="700" y="240">no forms, no categories,</text>
    <text x="700" y="257">no ticket templates.</text>

    <rect x="980" y="180" width="280" height="86" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
    <text x="1000" y="206">Receives one of:</text>
    <text x="1000" y="225">• direct answer + sources</text>
    <text x="1000" y="242">• action confirmation</text>
    <text x="1000" y="259">• escalation handoff</text>

    <rect x="1280" y="180" width="280" height="86" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
    <text x="1300" y="206">Self-resolves OR</text>
    <text x="1300" y="225">waits for human IT with</text>
    <text x="1300" y="242">structured handoff already</text>
    <text x="1300" y="259">delivered to Tier 2.</text>
  </g>

  <!-- Row label: Pain points (BEFORE system) -->
  <text x="40" y="320" font-size="11" font-weight="700" fill="#dc2626" letter-spacing="0.5">PAIN POINT</text>
  <text x="40" y="335" font-size="10" fill="#dc2626">(without us)</text>

  <g font-size="11.5">
    <rect x="80" y="295" width="280" height="86" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" rx="8"/>
    <text x="100" y="320" fill="#7f1d1d">"Where do I even start?"</text>
    <text x="100" y="340" fill="#991b1b" font-size="11">Wiki? Slack? IT portal?</text>
    <text x="100" y="356" fill="#991b1b" font-size="11">Email someone? Different</text>
    <text x="100" y="372" fill="#991b1b" font-size="11">answer in each place.</text>

    <rect x="380" y="295" width="280" height="86" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" rx="8"/>
    <text x="400" y="320" fill="#7f1d1d">"How do I phrase this?"</text>
    <text x="400" y="340" fill="#991b1b" font-size="11">Ticket forms ask for</text>
    <text x="400" y="356" fill="#991b1b" font-size="11">priority, category, system —</text>
    <text x="400" y="372" fill="#991b1b" font-size="11">user doesn't know any of it.</text>

    <rect x="680" y="295" width="280" height="86" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" rx="8"/>
    <text x="700" y="320" fill="#7f1d1d">"Did this even submit?"</text>
    <text x="700" y="340" fill="#991b1b" font-size="11">Long load times, no</text>
    <text x="700" y="356" fill="#991b1b" font-size="11">feedback during processing,</text>
    <text x="700" y="372" fill="#991b1b" font-size="11">unclear next step.</text>

    <rect x="980" y="295" width="280" height="86" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" rx="8"/>
    <text x="1000" y="320" fill="#7f1d1d">"Is this answer right?"</text>
    <text x="1000" y="340" fill="#991b1b" font-size="11">Generic AI responses with</text>
    <text x="1000" y="356" fill="#991b1b" font-size="11">no source. Could be wrong.</text>
    <text x="1000" y="372" fill="#991b1b" font-size="11">Now the user is liable.</text>

    <rect x="1280" y="295" width="280" height="86" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" rx="8"/>
    <text x="1300" y="320" fill="#7f1d1d">"Now I'll need to retell</text>
    <text x="1300" y="338" fill="#7f1d1d">my whole story to IT."</text>
    <text x="1300" y="356" fill="#991b1b" font-size="11">Repeat context, repeat</text>
    <text x="1300" y="372" fill="#991b1b" font-size="11">history, repeat frustration.</text>
  </g>

  <!-- Row label: System response -->
  <text x="40" y="430" font-size="11" font-weight="700" fill="#059669" letter-spacing="0.5">HOW WE</text>
  <text x="40" y="445" font-size="11" font-weight="700" fill="#059669" letter-spacing="0.5">ADDRESS IT</text>

  <g font-size="11.5">
    <rect x="80" y="410" width="280" height="86" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" rx="8"/>
    <text x="100" y="434" fill="#14532d">Single chat front door.</text>
    <text x="100" y="453" fill="#166534" font-size="11">No portal-hopping. Welcome</text>
    <text x="100" y="469" fill="#166534" font-size="11">message lists what we do.</text>
    <text x="100" y="485" fill="#166534" font-size="11">Sample prompts as one-tap.</text>

    <rect x="380" y="410" width="280" height="86" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" rx="8"/>
    <text x="400" y="434" fill="#14532d">Free-text input, no schema.</text>
    <text x="400" y="453" fill="#166534" font-size="11">Intake Agent classifies and</text>
    <text x="400" y="469" fill="#166534" font-size="11">extracts entities so the user</text>
    <text x="400" y="485" fill="#166534" font-size="11">never has to.</text>

    <rect x="680" y="410" width="280" height="86" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" rx="8"/>
    <text x="700" y="434" fill="#14532d">Live status indicator.</text>
    <text x="700" y="453" fill="#166534" font-size="11">"Classifying… Searching</text>
    <text x="700" y="469" fill="#166534" font-size="11">docs… Submitting…" —</text>
    <text x="700" y="485" fill="#166534" font-size="11">user sees the system work.</text>

    <rect x="980" y="410" width="280" height="86" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" rx="8"/>
    <text x="1000" y="434" fill="#14532d">Source citations on every</text>
    <text x="1000" y="453" fill="#14532d">grounded answer.</text>
    <text x="1000" y="469" fill="#166534" font-size="11">User can verify the policy.</text>
    <text x="1000" y="485" fill="#166534" font-size="11">No invention.</text>

    <rect x="1280" y="410" width="280" height="86" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5" rx="8"/>
    <text x="1300" y="434" fill="#14532d">Structured handoff package.</text>
    <text x="1300" y="453" fill="#166534" font-size="11">Original request, intent,</text>
    <text x="1300" y="469" fill="#166534" font-size="11">extracted entities, attempted</text>
    <text x="1300" y="485" fill="#166534" font-size="11">tools — all delivered to IT.</text>
  </g>

  <!-- Row label: Emotional arc -->
  <text x="40" y="565" font-size="11" font-weight="700" fill="#666" letter-spacing="0.5">EMOTIONAL</text>
  <text x="40" y="580" font-size="11" font-weight="700" fill="#666" letter-spacing="0.5">STATE</text>

  <!-- Emotional curve background -->
  <rect x="80" y="535" width="1480" height="100" fill="white" stroke="#e5e7eb" stroke-width="1" rx="8"/>

  <!-- The curve itself - goes from frustrated → curious → anxious → relieved → satisfied -->
  <!-- Y axis: 555 = top (positive), 615 = bottom (negative), 585 = neutral -->
  <path d="M 220 605 Q 370 595 520 580 Q 670 565 820 580 Q 970 575 1120 555 Q 1270 555 1420 555"
    stroke="#3b82f6" stroke-width="3" fill="none"/>

  <!-- Emotion labels at each phase -->
  <g font-size="11" fill="#1f2937">
    <circle cx="220" cy="605" r="6" fill="#dc2626"/>
    <text x="220" y="630" text-anchor="middle" font-weight="600">😟 Frustrated</text>

    <circle cx="520" cy="580" r="6" fill="#f59e0b"/>
    <text x="520" y="605" text-anchor="middle" font-weight="600">🤔 Curious</text>

    <circle cx="820" cy="580" r="6" fill="#3b82f6"/>
    <text x="820" y="605" text-anchor="middle" font-weight="600">⏳ Engaged</text>

    <circle cx="1120" cy="555" r="6" fill="#10b981"/>
    <text x="1120" y="544" text-anchor="middle" font-weight="600">😌 Relieved</text>

    <circle cx="1420" cy="555" r="6" fill="#10b981"/>
    <text x="1420" y="544" text-anchor="middle" font-weight="600">✅ Resolved</text>
  </g>

  <!-- Bottom panel: which agent is active in each phase -->
  <text x="40" y="690" font-size="11" font-weight="700" fill="#666" letter-spacing="0.5">AGENT</text>
  <text x="40" y="705" font-size="11" font-weight="700" fill="#666" letter-spacing="0.5">ACTIVITY</text>

  <g font-size="10.5" font-weight="600">
    <rect x="80" y="660" width="280" height="56" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" rx="8"/>
    <text x="100" y="682" fill="#1e3a8a">(none — pre-system)</text>
    <text x="100" y="700" font-weight="400" fill="#3b82f6">User hasn't reached us yet</text>

    <rect x="380" y="660" width="280" height="56" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" rx="8"/>
    <text x="400" y="682" fill="#1e3a8a">UI loads · sample prompts</text>
    <text x="400" y="700" font-weight="400" fill="#3b82f6">Welcome message displayed</text>

    <rect x="680" y="660" width="280" height="56" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" rx="8"/>
    <text x="700" y="682" fill="#1e3a8a">Intake → Knowledge</text>
    <text x="700" y="700" font-weight="400" fill="#3b82f6">Classify · retrieve from RAG</text>

    <rect x="980" y="660" width="280" height="56" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" rx="8"/>
    <text x="1000" y="682" fill="#1e3a8a">Workflow → Escalation</text>
    <text x="1000" y="700" font-weight="400" fill="#3b82f6">Tool call · or human handoff</text>

    <rect x="1280" y="660" width="280" height="56" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5" rx="8"/>
    <text x="1300" y="682" fill="#1e3a8a">(handoff complete)</text>
    <text x="1300" y="700" font-weight="400" fill="#3b82f6">Tier 2 sees structured ticket</text>
  </g>

  <!-- Footer panel: success metrics -->
  <rect x="80" y="745" width="1480" height="120" fill="white" stroke="#e5e7eb" stroke-width="1.5" rx="8"/>
  <text x="100" y="772" font-size="13" font-weight="700" fill="#1f2937">Why this journey works</text>

  <g font-size="11.5" fill="#374151">
    <text x="100" y="797">▸ The user never has to know which IT system to talk to. One front door.</text>
    <text x="100" y="817">▸ The user never has to phrase their problem as a ticket. The Intake Agent handles classification.</text>
    <text x="100" y="837">▸ When AI can't auto-resolve, escalation is fast — and Tier 2 receives full context, not a one-line "user needs help."</text>
    <text x="100" y="857">▸ Trust is earned through visible source citations and intermediate status updates, not a black-box answer.</text>
  </g>
</svg>
