<svg viewBox="0 0 1800 1200" width="100%" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect width="1800" height="1200" fill="#ffffff"/>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2937"/>
    </marker>
    <marker id="arrowblue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowgreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#047857"/>
    </marker>
    <marker id="arrowamber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <text x="60" y="60" font-size="32" font-weight="700" fill="#111827">System Architecture</text>
  <text x="60" y="92" font-size="17" fill="#4b5563">Multi agent IT support assistant</text>

  <rect x="700" y="140" width="400" height="80" fill="#111827" rx="10"/>
  <text x="900" y="178" text-anchor="middle" font-size="20" font-weight="700" fill="white">Employee user</text>
  <text x="900" y="202" text-anchor="middle" font-size="14" fill="#d1d5db">Plain language IT request</text>

  <line x1="900" y1="220" x2="900" y2="270" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="600" y="270" width="600" height="100" fill="#ffffff" stroke="#111827" stroke-width="3" rx="10"/>
  <text x="900" y="306" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">Chat interface</text>
  <text x="900" y="332" text-anchor="middle" font-size="14" fill="#374151">Built on Next.js</text>
  <text x="900" y="354" text-anchor="middle" font-size="14" fill="#374151">Live status indicator, source citations, intent and confidence display</text>

  <line x1="900" y1="370" x2="900" y2="420" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="700" y="420" width="400" height="70" fill="#ffffff" stroke="#111827" stroke-width="3" rx="10"/>
  <text x="900" y="456" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Chat API endpoint</text>
  <text x="900" y="478" text-anchor="middle" font-size="14" fill="#4b5563">POST /api/chat</text>

  <line x1="900" y1="490" x2="900" y2="540" stroke="#1f2937" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="80" y="540" width="1640" height="380" fill="#eff6ff" stroke="#1d4ed8" stroke-width="3" stroke-dasharray="10,6" rx="14"/>
  <text x="110" y="580" font-size="22" font-weight="700" fill="#1e3a8a">LangGraph orchestrator</text>
  <text x="110" y="608" font-size="15" fill="#1d4ed8">State graph with conditional routing on intent and confidence</text>

  <rect x="120" y="640" width="370" height="240" fill="#ffffff" stroke="#1d4ed8" stroke-width="3" rx="10"/>
  <rect x="120" y="640" width="370" height="46" fill="#1d4ed8" rx="10"/>
  <rect x="120" y="676" width="370" height="10" fill="#1d4ed8"/>
  <text x="305" y="672" text-anchor="middle" font-size="18" font-weight="700" fill="white">1. Intake Agent</text>
  <text x="145" y="716" font-size="15" font-weight="700" fill="#1e3a8a">Classifies the request</text>
  <text x="145" y="740" font-size="13" fill="#374151">Access, account, ticket status,</text>
  <text x="145" y="760" font-size="13" fill="#374151">general Q and A, greeting</text>
  <text x="145" y="794" font-size="15" font-weight="700" fill="#1e3a8a">Extracts entities</text>
  <text x="145" y="818" font-size="13" fill="#374151">Tool name, ticket ID, cause</text>
  <text x="145" y="855" font-size="12" fill="#6b7280">src/agents/intake.ts</text>

  <line x1="490" y1="760" x2="540" y2="760" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowblue)"/>

  <rect x="540" y="640" width="370" height="240" fill="#ffffff" stroke="#1d4ed8" stroke-width="3" rx="10"/>
  <rect x="540" y="640" width="370" height="46" fill="#1d4ed8" rx="10"/>
  <rect x="540" y="676" width="370" height="10" fill="#1d4ed8"/>
  <text x="725" y="672" text-anchor="middle" font-size="18" font-weight="700" fill="white">2. Knowledge Agent</text>
  <text x="565" y="716" font-size="15" font-weight="700" fill="#1e3a8a">Retrieval</text>
  <text x="565" y="740" font-size="13" fill="#374151">Embeds query, queries Chroma,</text>
  <text x="565" y="760" font-size="13" fill="#374151">returns top k chunks</text>
  <text x="565" y="794" font-size="15" font-weight="700" fill="#1e3a8a">Grounded synthesis</text>
  <text x="565" y="818" font-size="13" fill="#374151">Answer with source citations to</text>
  <text x="565" y="838" font-size="13" fill="#374151">the original markdown sections</text>
  <text x="565" y="860" font-size="12" fill="#6b7280">src/agents/knowledge.ts</text>

  <line x1="910" y1="760" x2="960" y2="760" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrowblue)"/>

  <rect x="960" y="640" width="370" height="240" fill="#ffffff" stroke="#1d4ed8" stroke-width="3" rx="10"/>
  <rect x="960" y="640" width="370" height="46" fill="#1d4ed8" rx="10"/>
  <rect x="960" y="676" width="370" height="10" fill="#1d4ed8"/>
  <text x="1145" y="672" text-anchor="middle" font-size="18" font-weight="700" fill="white">3. Workflow Agent</text>
  <text x="985" y="716" font-size="15" font-weight="700" fill="#1e3a8a">Decides which tool to call</text>
  <text x="985" y="744" font-size="13" fill="#374151">create_access_request</text>
  <text x="985" y="764" font-size="13" fill="#374151">create_account_ticket</text>
  <text x="985" y="784" font-size="13" fill="#374151">get_ticket_status</text>
  <text x="985" y="804" font-size="13" fill="#374151">update_ticket_with_note</text>
  <text x="985" y="838" font-size="14" fill="#1e3a8a" font-weight="700">Calls them through the MCP server</text>
  <text x="985" y="860" font-size="12" fill="#6b7280">src/agents/workflow.ts</text>

  <line x1="1330" y1="760" x2="1380" y2="760" stroke="#b45309" stroke-width="3" marker-end="url(#arrowamber)"/>

  <rect x="1380" y="640" width="320" height="240" fill="#ffffff" stroke="#b45309" stroke-width="3" rx="10"/>
  <rect x="1380" y="640" width="320" height="46" fill="#b45309" rx="10"/>
  <rect x="1380" y="676" width="320" height="10" fill="#b45309"/>
  <text x="1540" y="672" text-anchor="middle" font-size="18" font-weight="700" fill="white">4. Escalation Agent</text>
  <text x="1405" y="716" font-size="15" font-weight="700" fill="#92400e">Triggers when</text>
  <text x="1405" y="740" font-size="13" fill="#374151">Confidence is too low</text>
  <text x="1405" y="760" font-size="13" fill="#374151">A tool call failed</text>
  <text x="1405" y="780" font-size="13" fill="#374151">A risky pattern is detected</text>
  <text x="1405" y="814" font-size="15" font-weight="700" fill="#92400e">Builds the handoff</text>
  <text x="1405" y="838" font-size="13" fill="#374151">Original message, entities, tools</text>
  <text x="1405" y="860" font-size="12" fill="#6b7280">src/agents/escalation.ts</text>

  <line x1="305" y1="970" x2="305" y2="900" stroke="#047857" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <line x1="725" y1="970" x2="725" y2="900" stroke="#047857" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <line x1="1145" y1="970" x2="1145" y2="900" stroke="#047857" stroke-width="3" marker-end="url(#arrowgreen)"/>
  <line x1="1540" y1="970" x2="1540" y2="900" stroke="#b45309" stroke-width="3" marker-end="url(#arrowamber)"/>

  <rect x="120" y="970" width="370" height="140" fill="#ffffff" stroke="#047857" stroke-width="3" rx="10"/>
  <text x="305" y="1006" text-anchor="middle" font-size="18" font-weight="700" fill="#064e3b">OpenAI</text>
  <text x="145" y="1038" font-size="14" fill="#374151">text embedding 3 small</text>
  <text x="145" y="1058" font-size="13" fill="#6b7280">For query and document embeddings</text>
  <text x="145" y="1086" font-size="14" fill="#374151">gpt 4o mini</text>
  <text x="145" y="1106" font-size="13" fill="#6b7280">For grounded answer synthesis</text>

  <rect x="540" y="970" width="370" height="140" fill="#ffffff" stroke="#047857" stroke-width="3" rx="10"/>
  <text x="725" y="1006" text-anchor="middle" font-size="18" font-weight="700" fill="#064e3b">Chroma vector database</text>
  <text x="565" y="1038" font-size="14" fill="#374151">21 chunks across 4 source files</text>
  <text x="565" y="1064" font-size="14" fill="#374151">Indexed via npm run ingest</text>
  <text x="565" y="1090" font-size="14" fill="#374151">Runs in Docker on port 8000</text>

  <rect x="960" y="970" width="370" height="140" fill="#ffffff" stroke="#047857" stroke-width="3" rx="10"/>
  <text x="1145" y="1006" text-anchor="middle" font-size="18" font-weight="700" fill="#064e3b">MCP server</text>
  <text x="985" y="1038" font-size="14" fill="#374151">Built on the official Model Context</text>
  <text x="985" y="1058" font-size="14" fill="#374151">Protocol SDK over stdio</text>
  <text x="985" y="1086" font-size="14" fill="#374151">Four tools registered with schemas</text>

  <rect x="1380" y="970" width="320" height="140" fill="#ffffff" stroke="#b45309" stroke-width="3" rx="10"/>
  <text x="1540" y="1006" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">Tier 2 human IT</text>
  <text x="1405" y="1038" font-size="14" fill="#374151">Receives a structured</text>
  <text x="1405" y="1058" font-size="14" fill="#374151">handoff package containing</text>
  <text x="1405" y="1078" font-size="14" fill="#374151">everything the agents tried</text>
  <text x="1405" y="1098" font-size="14" fill="#374151">and learned</text>
</svg>
